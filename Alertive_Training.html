<style>
  :root {
    --navy: #17335e;
    --teal: #2bb6c4;
    --light-bg: #e3f2f6;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
    color: #2c2c2c;
    margin: 0;
    background: #fff;
    line-height: 1.6;

  .cover {
    background: var(--navy);
    color: #fff;
    text-align: center;
    padding: 50px 20px;

  .cover h1 .accent { color: var(--teal); }
  .cover p { font-size: 1em; }
  main { max-width: 850px; margin: 0 auto; padding: 20px 40px 60px; }
  .back-link {
    display: inline-block;
    margin: 30px 40px 0;
    color: var(--teal);
    text-decoration: none;
    font-weight: 600;
  }
  .placeholder {
    background: var(--light-bg);
    border-radius: 12px;
    padding: 40px 30px;
    text-align: center;
    margin-top: 20px;
  }
  .placeholder .icon { font-size: 3em; margin-bottom: 15px; }
  .placeholder h2 { color: var(--navy); margin: 0 0 10px; }
  .placeholder p { color: #4a5a6e; margin: 0; }
  footer {
    text-align: center;
    padding: 30px;
    color: var(--navy);
    font-weight: bold;
  }
  a.site { color: var(--teal); }

  @media (max-width: 700px) {
    .cover { padding: 35px 16px; }
    .cover h1 { font-size: 1.6em; }
    main { padding: 16px 20px 40px; }
    .back-link { margin: 20px 20px 0; }
